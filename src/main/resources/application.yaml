server:
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    use-root-path: true

spring:
  application:
    name: authserver
  datasource:
    url: jdbc:h2:mem:db
    username: sa
    password: sa
  jpa:
    show-sql: true
    open-in-view: false
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true

app:
  security:
    jwt:
      secret: ${JWT_SECRET:troque-este-segredo-por-uma-string-com-pelo-menos-32-bytes}
      expiration-seconds: 3600
      issuer: authserver
    admin:
      email: ${ADMIN_EMAIL:admin@authserver.local}
      password: ${ADMIN_PASSWORD:admin123}
      name: Administrador



